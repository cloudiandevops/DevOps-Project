apiVersion: apps/v1
kind: Deployment
metadata:
  name: netflix-app
  labels:
    app: netflix-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: netflix-app
  template:
    metadata:
      labels:
        app: netflix-app
    spec:
      containers:
        - name: netflix-app
          image: 308564447263.dkr.ecr.ap-south-1.amazonaws.com/netflix-prod:master-92c4e511f3a98129bbf3e46b5be9ea27e5b9e783
          ports:
            - containerPort: 80
